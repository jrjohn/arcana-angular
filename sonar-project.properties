sonar.projectKey=angular-app
sonar.projectName=arcana-angular
sonar.sources=src
sonar.exclusions=dist/**,node_modules/**,**/*.spec.ts,coverage/**,src/scripts/**
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts
sonar.javascript.lcov.reportPaths=coverage/arcana-angular/lcov.info

# Suppress accessibility rules that don't apply to this SPA's current phase
sonar.issue.ignore.multicriteria=e1,e2,e3,e4

# Web:MouseEventWithoutKeyboardEquivalentCheck - HTML templates use Angular event binding
sonar.issue.ignore.multicriteria.e1.ruleKey=Web:MouseEventWithoutKeyboardEquivalentCheck
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.html

# Web:S6819 - Semantic HTML roles handled by Angular ARIA directives
sonar.issue.ignore.multicriteria.e2.ruleKey=Web:S6819
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.html

# css:S7924 - Color contrast managed by design system tokens
sonar.issue.ignore.multicriteria.e3.ruleKey=css:S7924
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.scss

# typescript:S4144 - Duplicate function implementations intentional for overloading
sonar.issue.ignore.multicriteria.e4.ruleKey=typescript:S4144
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.ts
